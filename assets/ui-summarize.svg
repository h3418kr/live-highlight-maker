<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <filter id="win" x="-5%" y="-5%" width="110%" height="112%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1120" height="620" fill="#f1f5f9"/>

  <!-- ===== Window mockup (left) ===== -->
  <g filter="url(#win)">
    <rect x="30" y="30" width="560" height="560" rx="10" fill="#2d2d2d"/>
    <!-- title bar -->
    <rect x="30" y="30" width="560" height="34" rx="10" fill="#1f1f1f"/>
    <rect x="30" y="48" width="560" height="16" fill="#1f1f1f"/>
    <text x="48" y="52" font-size="13" fill="#cbd5e1">YouTube 영상 요약기</text>
    <circle cx="548" cy="47" r="6" fill="#3a3a3a"/><circle cx="568" cy="47" r="6" fill="#ef4444"/>

    <!-- tabs -->
    <rect x="42" y="74" width="110" height="30" rx="5" fill="#1e1e1e"/>
    <text x="97" y="94" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">영상 요약</text>
    <rect x="158" y="74" width="150" height="30" rx="5" fill="#3c3c3c"/>
    <text x="233" y="94" font-size="13" fill="#bbbbbb" text-anchor="middle">완성 영상 만들기</text>

    <!-- URL row -->
    <text x="48" y="132" font-size="13" fill="#e0e0e0">YouTube URL</text>
    <rect x="150" y="118" width="420" height="26" rx="4" fill="#3c3c3c" stroke="#4b5563"/>
    <text x="162" y="135" font-size="12" fill="#7dd3fc">https://youtube.com/watch?v=...</text>

    <!-- output folder -->
    <text x="48" y="168" font-size="13" fill="#e0e0e0">출력 폴더</text>
    <rect x="150" y="154" width="330" height="26" rx="4" fill="#3c3c3c" stroke="#4b5563"/>
    <text x="162" y="171" font-size="12" fill="#9ca3af">...\output</text>
    <rect x="488" y="154" width="82" height="26" rx="4" fill="#3c3c3c" stroke="#565656"/>
    <text x="529" y="171" font-size="12" fill="#e0e0e0" text-anchor="middle">찾아보기</text>

    <!-- options box -->
    <rect x="48" y="196" width="522" height="150" rx="6" fill="#2d2d2d" stroke="#565656"/>
    <text x="62" y="192" font-size="11" fill="#9ca3af">옵션</text>
    <text x="62" y="222" font-size="12" fill="#e0e0e0">목표 길이(분)</text>
    <rect x="150" y="210" width="44" height="22" rx="3" fill="#3c3c3c"/><text x="172" y="225" font-size="11" fill="#e0e0e0" text-anchor="middle">10</text>
    <text x="240" y="222" font-size="12" fill="#e0e0e0">Whisper 모델</text>
    <rect x="360" y="210" width="120" height="22" rx="3" fill="#3c3c3c"/><text x="370" y="225" font-size="11" fill="#e0e0e0">small (권장)</text>
    <text x="62" y="252" font-size="12" fill="#e0e0e0">언어  ko</text>
    <text x="240" y="252" font-size="12" fill="#e0e0e0">화질</text>
    <rect x="300" y="240" width="60" height="22" rx="3" fill="#3c3c3c"/><text x="330" y="255" font-size="11" fill="#e0e0e0" text-anchor="middle">720</text>
    <text x="62" y="282" font-size="12" fill="#e0e0e0">피크 앞 5초 · 뒤 20초 · 장면묶기 8초</text>
    <text x="62" y="314" font-size="12" fill="#e0e0e0">화면 전환</text>
    <rect x="150" y="302" width="110" height="22" rx="3" fill="#3c3c3c"/><text x="160" y="317" font-size="11" fill="#e0e0e0">암전 (기본)</text>
    <text x="285" y="314" font-size="12" fill="#e0e0e0">효과음</text>
    <rect x="345" y="302" width="90" height="22" rx="3" fill="#3c3c3c"/><text x="355" y="317" font-size="11" fill="#e0e0e0">휙 (기본)</text>

    <!-- run button -->
    <rect x="48" y="360" width="522" height="38" rx="5" fill="#0078d4"/>
    <text x="309" y="385" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">다운로드 &amp; 요약</text>

    <!-- log -->
    <rect x="48" y="410" width="522" height="162" rx="5" fill="#1e1e1e"/>
    <text x="60" y="432" font-size="11" fill="#4ade80" font-family="Consolas,monospace">[다운로드] 영상 받는 중...</text>
    <text x="60" y="452" font-size="11" fill="#d4d4d4" font-family="Consolas,monospace">[분석] 하이라이트 구간 탐색...</text>
    <text x="60" y="472" font-size="11" fill="#d4d4d4" font-family="Consolas,monospace">[자막] Whisper 인식 중...</text>
    <text x="60" y="492" font-size="11" fill="#facc15" font-family="Consolas,monospace">[편집] 요약 영상 생성 완료 ✓</text>
  </g>

  <!-- number badges on mockup -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <circle cx="97" cy="89" r="14" fill="#f43f5e"/><text x="97" y="94" fill="#fff">1</text>
    <circle cx="150" cy="131" r="14" fill="#f43f5e"/><text x="150" y="136" fill="#fff">2</text>
    <circle cx="150" cy="167" r="14" fill="#f43f5e"/><text x="150" y="172" fill="#fff">3</text>
    <circle cx="62" cy="196" r="14" fill="#f43f5e"/><text x="62" y="201" fill="#fff">4</text>
    <circle cx="309" cy="379" r="14" fill="#fb923c"/><text x="309" y="384" fill="#fff">5</text>
    <circle cx="60" cy="410" r="14" fill="#fb923c"/><text x="60" y="415" fill="#fff">6</text>
  </g>

  <!-- ===== Legend (right) ===== -->
  <text x="640" y="60" font-size="22" font-weight="800" fill="#0f172a">🔥 영상 요약 탭 — 방송을 하이라이트로</text>
  <g font-size="15">
    <g>
      <circle cx="654" cy="104" r="14" fill="#f43f5e"/><text x="654" y="109" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
      <text x="682" y="102" font-weight="700" fill="#0f172a">탭 선택</text>
      <text x="682" y="122" fill="#475569">'영상 요약' 탭에서 시작합니다.</text>
    </g>
    <g>
      <circle cx="654" cy="160" r="14" fill="#f43f5e"/><text x="654" y="165" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
      <text x="682" y="158" font-weight="700" fill="#0f172a">방송/영상 URL 붙여넣기</text>
      <text x="682" y="178" fill="#475569">다시보기 주소만 넣으면 자동으로 내려받습니다.</text>
    </g>
    <g>
      <circle cx="654" cy="216" r="14" fill="#f43f5e"/><text x="654" y="221" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
      <text x="682" y="214" font-weight="700" fill="#0f172a">출력 폴더 선택</text>
      <text x="682" y="234" fill="#475569">결과 mp4·srt가 저장될 폴더. 기본 output.</text>
    </g>
    <g>
      <circle cx="654" cy="272" r="14" fill="#f43f5e"/><text x="654" y="277" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
      <text x="682" y="270" font-weight="700" fill="#0f172a">옵션 조절</text>
      <text x="682" y="290" fill="#475569">목표 길이·자막 품질·화질·전환·효과음 설정.</text>
      <text x="682" y="310" fill="#475569">기본값 그대로 써도 충분합니다.</text>
    </g>
    <g>
      <circle cx="654" cy="348" r="14" fill="#fb923c"/><text x="654" y="353" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">5</text>
      <text x="682" y="346" font-weight="700" fill="#0f172a">「다운로드 &amp; 요약」 클릭 ▶</text>
      <text x="682" y="366" fill="#475569">다운로드 → 하이라이트 분석 → 편집까지 자동.</text>
    </g>
    <g>
      <circle cx="654" cy="404" r="14" fill="#fb923c"/><text x="654" y="409" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">6</text>
      <text x="682" y="402" font-weight="700" fill="#0f172a">진행 로그 확인</text>
      <text x="682" y="422" fill="#475569">단계별 진행 상황이 실시간으로 표시됩니다.</text>
    </g>
  </g>
  <!-- result box -->
  <rect x="640" y="452" width="450" height="118" rx="10" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="662" y="482" font-size="15" font-weight="700" fill="#047857">✓ 완료되면 두 파일이 생깁니다</text>
  <text x="662" y="512" font-size="14" fill="#065f46">📹  제목_summary.mp4  — 하이라이트 요약 영상</text>
  <text x="662" y="540" font-size="14" fill="#065f46">💬  제목_summary.srt   — 자동 생성 자막</text>
</svg>
