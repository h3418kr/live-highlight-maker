<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/><stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e"/><stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1180" height="360" rx="18" fill="#f8fafc"/>
  <text x="40" y="52" font-size="26" font-weight="800" fill="#0f172a">Recommended workflow</text>
  <text x="40" y="80" font-size="16" fill="#64748b">Start with a single live-VOD URL and end with an upload-ready video</text>

  <!-- STEP 1 -->
  <g filter="url(#s)">
    <rect x="40" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="112" width="320" height="52" rx="16" fill="url(#c1)"/>
    <rect x="40" y="140" width="320" height="24" fill="url(#c1)"/>
    <text x="66" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 1 · Summarize tab</text>
    <text x="66" y="196" font-size="15" fill="#334155">🔗 Paste stream URL → auto download</text>
    <text x="66" y="224" font-size="15" fill="#334155">🔥 Audio analysis finds highlights</text>
    <text x="66" y="252" font-size="15" fill="#334155">💬 Whisper subtitles (SRT) auto-made</text>
    <text x="66" y="280" font-size="15" fill="#334155">🎞️ Transitions + SFX = summary clip</text>
    <text x="66" y="300" font-size="13" fill="#94a3b8">→ title_summary.mp4 + .srt</text>
  </g>

  <!-- arrow -->
  <g fill="#cbd5e1"><path d="M372,210 l26,0 l0,-9 l18,18 l-18,18 l0,-9 l-26,0 z"/></g>

  <!-- STEP 2 -->
  <g filter="url(#s)">
    <rect x="430" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="430" y="112" width="320" height="52" rx="16" fill="url(#c2)"/>
    <rect x="430" y="140" width="320" height="24" fill="url(#c2)"/>
    <text x="456" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 2 · Polish subtitles (opt.)</text>
    <text x="456" y="196" font-size="15" fill="#334155">📝 Open the .srt in a text editor</text>
    <text x="456" y="224" font-size="15" fill="#334155">✏️ Fix names &amp; wording by hand</text>
    <text x="456" y="252" font-size="15" fill="#334155">⏱️ Leave the timecodes untouched</text>
    <text x="456" y="288" font-size="13" fill="#94a3b8">Perfect AI subtitles with a human touch</text>
  </g>

  <!-- arrow -->
  <g fill="#cbd5e1"><path d="M762,210 l26,0 l0,-9 l18,18 l-18,18 l0,-9 l-26,0 z"/></g>

  <!-- STEP 3 -->
  <g filter="url(#s)">
    <rect x="820" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="820" y="112" width="320" height="52" rx="16" fill="url(#c3)"/>
    <rect x="820" y="140" width="320" height="24" fill="url(#c3)"/>
    <text x="846" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 3 · Finalize video</text>
    <text x="846" y="196" font-size="15" fill="#334155">🖼️ Thumbnail intro + cover insert</text>
    <text x="846" y="224" font-size="15" fill="#334155">🔥 Burn subtitles in (hardsub)</text>
    <text x="846" y="252" font-size="15" fill="#334155">🎬 Stitch intro/outro clips</text>
    <text x="846" y="280" font-size="15" fill="#334155">🎵 Auto-fit background music</text>
    <text x="846" y="300" font-size="13" fill="#94a3b8">→ upload-ready mp4</text>
  </g>
</svg>
