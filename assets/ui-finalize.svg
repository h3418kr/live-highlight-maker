<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <filter id="win2" x="-5%" y="-5%" width="110%" height="112%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1120" height="640" fill="#f1f5f9"/>

  <!-- ===== Window mockup (left) ===== -->
  <g filter="url(#win2)">
    <rect x="30" y="30" width="560" height="580" rx="10" fill="#2d2d2d"/>
    <rect x="30" y="30" width="560" height="34" rx="10" fill="#1f1f1f"/>
    <rect x="30" y="48" width="560" height="16" fill="#1f1f1f"/>
    <text x="48" y="52" font-size="13" fill="#cbd5e1">YouTube 영상 요약기</text>
    <circle cx="548" cy="47" r="6" fill="#3a3a3a"/><circle cx="568" cy="47" r="6" fill="#ef4444"/>

    <!-- tabs -->
    <rect x="42" y="74" width="110" height="30" rx="5" fill="#3c3c3c"/>
    <text x="97" y="94" font-size="13" fill="#bbbbbb" text-anchor="middle">영상 요약</text>
    <rect x="158" y="74" width="150" height="30" rx="5" fill="#1e1e1e"/>
    <text x="233" y="94" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">완성 영상 만들기</text>

    <!-- file rows -->
    <g font-size="12">
      <!-- helper: label + field + button -->
      <text x="48" y="130" fill="#e0e0e0">영상 파일</text>
      <rect x="170" y="116" width="300" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/><text x="180" y="132" fill="#9ca3af">제목_summary.mp4</text>
      <rect x="478" y="116" width="92" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="524" y="132" fill="#e0e0e0" text-anchor="middle">찾아보기</text>

      <text x="48" y="162" fill="#e0e0e0">자막 (.srt)</text>
      <rect x="170" y="148" width="300" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/><text x="180" y="164" fill="#9ca3af">제목_summary.srt</text>
      <rect x="478" y="148" width="92" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="524" y="164" fill="#e0e0e0" text-anchor="middle">찾아보기</text>

      <text x="48" y="194" fill="#e0e0e0">썸네일</text>
      <rect x="170" y="180" width="300" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/><text x="180" y="196" fill="#9ca3af">thumbnail.jpg</text>
      <rect x="478" y="180" width="92" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="524" y="196" fill="#e0e0e0" text-anchor="middle">찾아보기</text>

      <text x="48" y="226" fill="#e0e0e0">인트로 영상</text>
      <rect x="170" y="212" width="270" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/>
      <rect x="448" y="212" width="80" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="488" y="228" fill="#e0e0e0" text-anchor="middle">찾아보기</text>
      <rect x="534" y="212" width="26" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="547" y="228" fill="#e0e0e0" text-anchor="middle">✕</text>

      <text x="48" y="258" fill="#e0e0e0">아웃트로 영상</text>
      <rect x="170" y="244" width="270" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/>
      <rect x="448" y="244" width="80" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="488" y="260" fill="#e0e0e0" text-anchor="middle">찾아보기</text>
      <rect x="534" y="244" width="26" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="547" y="260" fill="#e0e0e0" text-anchor="middle">✕</text>

      <text x="48" y="290" fill="#e0e0e0">배경음악</text>
      <rect x="170" y="276" width="270" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/><text x="180" y="292" fill="#9ca3af">bgm.mp3</text>
      <rect x="448" y="276" width="80" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="488" y="292" fill="#e0e0e0" text-anchor="middle">찾아보기</text>
      <rect x="534" y="276" width="26" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="547" y="292" fill="#e0e0e0" text-anchor="middle">✕</text>

      <text x="48" y="322" fill="#e0e0e0">출력 파일</text>
      <rect x="170" y="308" width="300" height="24" rx="4" fill="#3c3c3c" stroke="#4b5563"/><text x="180" y="324" fill="#9ca3af">제목_완성.mp4</text>
      <rect x="478" y="308" width="92" height="24" rx="4" fill="#3c3c3c" stroke="#565656"/><text x="524" y="324" fill="#e0e0e0" text-anchor="middle">저장 위치</text>
    </g>

    <!-- options -->
    <rect x="48" y="346" width="522" height="112" rx="6" fill="#2d2d2d" stroke="#565656"/>
    <text x="62" y="342" font-size="11" fill="#9ca3af">옵션</text>
    <g font-size="12" fill="#e0e0e0">
      <rect x="62" y="360" width="14" height="14" rx="3" fill="#0078d4"/><text x="84" y="372">썸네일 인트로 붙이기</text>
      <text x="320" y="372">인트로 길이 2.5초</text>
      <rect x="62" y="388" width="14" height="14" rx="3" fill="#0078d4"/><text x="84" y="400">썸네일 표지(커버) 삽입</text>
      <text x="320" y="400">자막 크기 24</text>
      <rect x="62" y="416" width="14" height="14" rx="3" fill="#0078d4"/><text x="84" y="428">자막 영상에 새겨넣기(하드섭)</text>
      <text x="320" y="428">배경음악 볼륨 0.25</text>
    </g>

    <!-- run button -->
    <rect x="48" y="472" width="522" height="38" rx="5" fill="#0078d4"/>
    <text x="309" y="497" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">완성 영상 만들기</text>

    <!-- log -->
    <rect x="48" y="522" width="522" height="72" rx="5" fill="#1e1e1e"/>
    <text x="60" y="544" font-size="11" fill="#4ade80" font-family="Consolas,monospace">[합치기] 인트로+본편+아웃트로 이어붙임...</text>
    <text x="60" y="564" font-size="11" fill="#facc15" font-family="Consolas,monospace">[배경음악] 길이에 맞춰 삽입 완료 ✓</text>
  </g>

  <!-- number badges on mockup -->
  <g font-size="14" font-weight="700" text-anchor="middle">
    <circle cx="150" cy="128" r="13" fill="#f43f5e"/><text x="150" y="133" fill="#fff">1</text>
    <circle cx="150" cy="160" r="13" fill="#f43f5e"/><text x="150" y="165" fill="#fff">2</text>
    <circle cx="150" cy="192" r="13" fill="#f43f5e"/><text x="150" y="197" fill="#fff">3</text>
    <circle cx="150" cy="234" r="13" fill="#0ea5e9"/><text x="150" y="239" fill="#fff">4</text>
    <circle cx="150" cy="288" r="13" fill="#0ea5e9"/><text x="150" y="293" fill="#fff">5</text>
    <circle cx="62" cy="346" r="13" fill="#a855f7"/><text x="62" y="351" fill="#fff">6</text>
    <circle cx="309" cy="491" r="13" fill="#fb923c"/><text x="309" y="496" fill="#fff">7</text>
  </g>

  <!-- ===== Legend (right) ===== -->
  <text x="640" y="58" font-size="22" font-weight="800" fill="#0f172a">🎬 완성 영상 만들기 탭 — 업로드용으로</text>
  <g font-size="14">
    <g>
      <circle cx="654" cy="96" r="13" fill="#f43f5e"/><text x="654" y="101" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">1</text>
      <text x="680" y="94" font-weight="700" fill="#0f172a" font-size="15">영상 파일</text>
      <text x="680" y="113" fill="#475569">STEP 1에서 만든 _summary.mp4 선택. (필수)</text>
    </g>
    <g>
      <circle cx="654" cy="146" r="13" fill="#f43f5e"/><text x="654" y="151" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">2</text>
      <text x="680" y="144" font-weight="700" fill="#0f172a" font-size="15">자막 파일(.srt)</text>
      <text x="680" y="163" fill="#475569">수정한 자막 선택. 영상 고르면 자동으로 채워짐.</text>
    </g>
    <g>
      <circle cx="654" cy="196" r="13" fill="#f43f5e"/><text x="654" y="201" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">3</text>
      <text x="680" y="194" font-weight="700" fill="#0f172a" font-size="15">썸네일 이미지</text>
      <text x="680" y="213" fill="#475569">인트로·표지로 쓸 jpg/png 선택.</text>
    </g>
    <g>
      <circle cx="654" cy="246" r="13" fill="#0ea5e9"/><text x="654" y="251" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">4</text>
      <text x="680" y="244" font-weight="700" fill="#0f172a" font-size="15">인트로 / 아웃트로 영상 (선택)</text>
      <text x="680" y="263" fill="#475569">본편 앞뒤에 붙일 영상. ✕로 비울 수 있음.</text>
    </g>
    <g>
      <circle cx="654" cy="296" r="13" fill="#0ea5e9"/><text x="654" y="301" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">5</text>
      <text x="680" y="294" font-weight="700" fill="#0f172a" font-size="15">배경음악 (선택)</text>
      <text x="680" y="313" fill="#475569">영상 전체 길이에 맞춰 자동 반복/컷되어 깔림.</text>
    </g>
    <g>
      <circle cx="654" cy="346" r="13" fill="#a855f7"/><text x="654" y="351" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">6</text>
      <text x="680" y="344" font-weight="700" fill="#0f172a" font-size="15">옵션 on/off</text>
      <text x="680" y="363" fill="#475569">인트로·커버·하드섭 켜고 끄기, 값 조절.</text>
    </g>
    <g>
      <circle cx="654" cy="396" r="13" fill="#fb923c"/><text x="654" y="401" font-weight="700" fill="#fff" text-anchor="middle" font-size="14">7</text>
      <text x="680" y="394" font-weight="700" fill="#0f172a" font-size="15">「완성 영상 만들기」 클릭 ▶</text>
      <text x="680" y="413" fill="#475569">모두 합쳐 업로드용 mp4 하나로 저장됩니다.</text>
    </g>
  </g>
  <rect x="640" y="440" width="452" height="150" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="662" y="470" font-size="15" font-weight="700" fill="#1d4ed8">🧩 이 탭이 하는 일</text>
  <text x="662" y="497" font-size="13.5" fill="#1e3a5f">썸네일 인트로 + 자막 새겨넣기 + 인트로/아웃트로</text>
  <text x="662" y="519" font-size="13.5" fill="#1e3a5f">영상 + 배경음악을 한 번에 합칩니다.</text>
  <text x="662" y="549" font-size="13.5" fill="#1e3a5f">→ 어디서 재생해도 자막이 보이는 완성 영상 완성!</text>
  <text x="662" y="575" font-size="12" fill="#64748b">필수는 '영상 파일' 하나뿐, 나머지는 모두 선택입니다.</text>
</svg>
