<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>

  <!-- faint waveform backdrop -->
  <g opacity="0.12" fill="none" stroke="#a5b4fc" stroke-width="3">
    <path d="M0,360 q20,-40 40,0 t40,0 t40,-30 t40,30 t40,-60 t40,60 t40,-20 t40,20 t40,-50 t40,50 t40,0 t40,-40 t40,40 t40,-70 t40,70 t40,-25 t40,25 t40,-45 t40,45 t40,0 t40,-35 t40,35 t40,-55 t40,55 t40,-15 t40,15 t40,-40 t40,40 t40,0"/>
  </g>

  <!-- LIVE badge -->
  <g filter="url(#soft)">
    <rect x="64" y="70" width="118" height="42" rx="21" fill="#ef4444"/>
    <circle cx="92" cy="91" r="8" fill="#ffffff"/>
    <text x="112" y="99" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="2">LIVE</text>
  </g>

  <!-- Title -->
  <text x="64" y="188" font-size="58" font-weight="800" fill="#ffffff">Turn live streams</text>
  <text x="64" y="256" font-size="58" font-weight="800" fill="#ffffff">
    <tspan fill="#ffffff">into </tspan><tspan fill="url(#accent)">highlight</tspan><tspan fill="#ffffff"> videos</tspan>
  </text>

  <!-- Subtitle -->
  <text x="66" y="308" font-size="24" fill="#c7d2fe">Auto-analyze long VODs to pull only the best moments,</text>
  <text x="66" y="342" font-size="24" fill="#c7d2fe">then add subtitles, transitions and BGM for an upload-ready video.</text>

  <!-- feature pills -->
  <g font-size="17" font-weight="600">
    <rect x="66" y="372" width="200" height="38" rx="19" fill="url(#glass)" stroke="#6366f1" stroke-opacity="0.5"/>
    <text x="166" y="397" fill="#e0e7ff" text-anchor="middle">🔥 Auto highlight extract</text>
    <rect x="280" y="372" width="156" height="38" rx="19" fill="url(#glass)" stroke="#6366f1" stroke-opacity="0.5"/>
    <text x="358" y="397" fill="#e0e7ff" text-anchor="middle">💬 AI subtitles (SRT)</text>
    <rect x="450" y="372" width="168" height="38" rx="19" fill="url(#glass)" stroke="#6366f1" stroke-opacity="0.5"/>
    <text x="534" y="397" fill="#e0e7ff" text-anchor="middle">🎬 Finished video</text>
  </g>

  <!-- right visual: filmstrip highlight extraction -->
  <g filter="url(#soft)">
    <!-- long broadcast bar -->
    <rect x="820" y="96" width="396" height="26" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="820" y="86" font-size="15" fill="#94a3b8">Long live VOD</text>
    <!-- highlight markers -->
    <rect x="852" y="96" width="34" height="26" rx="4" fill="url(#accent)"/>
    <rect x="960" y="96" width="30" height="26" rx="4" fill="url(#accent)"/>
    <rect x="1064" y="96" width="38" height="26" rx="4" fill="url(#accent)"/>
    <rect x="1150" y="96" width="28" height="26" rx="4" fill="url(#accent)"/>

    <!-- funnel arrows -->
    <g stroke="#fb923c" stroke-width="2.5" fill="none" opacity="0.9">
      <path d="M869,130 L940,176"/>
      <path d="M975,130 L1000,176"/>
      <path d="M1083,130 L1060,176"/>
      <path d="M1164,130 L1120,176"/>
    </g>

    <!-- highlight clips row -->
    <g>
      <rect x="900" y="184" width="86" height="120" rx="10" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
      <rect x="998" y="184" width="86" height="120" rx="10" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
      <rect x="1096" y="184" width="86" height="120" rx="10" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
      <!-- play icons -->
      <g fill="#fb923c">
        <path d="M934,232 l22,12 l-22,12 z"/>
        <path d="M1032,232 l22,12 l-22,12 z"/>
        <path d="M1130,232 l22,12 l-22,12 z"/>
      </g>
      <!-- subtitle lines -->
      <g fill="#64748b">
        <rect x="912" y="278" width="62" height="7" rx="3"/>
        <rect x="1010" y="278" width="62" height="7" rx="3"/>
        <rect x="1108" y="278" width="62" height="7" rx="3"/>
      </g>
    </g>
    <text x="900" y="336" font-size="15" fill="#94a3b8">Only the best moments</text>
  </g>
</svg>
