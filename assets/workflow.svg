<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/><stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f43f5e"/><stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1180" height="360" rx="18" fill="#f8fafc"/>
  <text x="40" y="52" font-size="26" font-weight="800" fill="#0f172a">추천 워크플로우</text>
  <text x="40" y="80" font-size="16" fill="#64748b">라이브 다시보기 URL 하나로 시작해서 업로드용 완성 영상까지</text>

  <!-- STEP 1 -->
  <g filter="url(#s)">
    <rect x="40" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="112" width="320" height="52" rx="16" fill="url(#c1)"/>
    <rect x="40" y="140" width="320" height="24" fill="url(#c1)"/>
    <text x="66" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 1 · 영상 요약 탭</text>
    <text x="66" y="196" font-size="15" fill="#334155">🔗 방송 URL 입력 → 자동 다운로드</text>
    <text x="66" y="224" font-size="15" fill="#334155">🔥 오디오 분석으로 하이라이트 추출</text>
    <text x="66" y="252" font-size="15" fill="#334155">💬 Whisper 자막(SRT) 자동 생성</text>
    <text x="66" y="280" font-size="15" fill="#334155">🎞️ 전환·효과음 넣어 요약본 완성</text>
    <text x="66" y="300" font-size="13" fill="#94a3b8">→ 제목_summary.mp4 + .srt</text>
  </g>

  <!-- arrow -->
  <g fill="#cbd5e1"><path d="M372,210 l26,0 l0,-9 l18,18 l-18,18 l0,-9 l-26,0 z"/></g>

  <!-- STEP 2 -->
  <g filter="url(#s)">
    <rect x="430" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="430" y="112" width="320" height="52" rx="16" fill="url(#c2)"/>
    <rect x="430" y="140" width="320" height="24" fill="url(#c2)"/>
    <text x="456" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 2 · 자막 다듬기 (선택)</text>
    <text x="456" y="196" font-size="15" fill="#334155">📝 .srt 파일을 메모장으로 열기</text>
    <text x="456" y="224" font-size="15" fill="#334155">✏️ 틀린 고유명사·표현 직접 수정</text>
    <text x="456" y="252" font-size="15" fill="#334155">⏱️ 타임코드는 그대로 두기</text>
    <text x="456" y="288" font-size="13" fill="#94a3b8">AI 자막을 사람 손으로 완벽하게</text>
  </g>

  <!-- arrow -->
  <g fill="#cbd5e1"><path d="M762,210 l26,0 l0,-9 l18,18 l-18,18 l0,-9 l-26,0 z"/></g>

  <!-- STEP 3 -->
  <g filter="url(#s)">
    <rect x="820" y="112" width="320" height="196" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="820" y="112" width="320" height="52" rx="16" fill="url(#c3)"/>
    <rect x="820" y="140" width="320" height="24" fill="url(#c3)"/>
    <text x="846" y="146" font-size="19" font-weight="700" fill="#ffffff">STEP 3 · 완성 영상 만들기</text>
    <text x="846" y="196" font-size="15" fill="#334155">🖼️ 썸네일 인트로 + 커버 삽입</text>
    <text x="846" y="224" font-size="15" fill="#334155">🔥 자막 새겨넣기(하드섭)</text>
    <text x="846" y="252" font-size="15" fill="#334155">🎬 인트로·아웃트로 영상 이어붙임</text>
    <text x="846" y="280" font-size="15" fill="#334155">🎵 배경음악 길이 맞춰 자동 삽입</text>
    <text x="846" y="300" font-size="13" fill="#94a3b8">→ 업로드용 완성 mp4</text>
  </g>
</svg>
